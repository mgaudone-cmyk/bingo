<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Simple Multiplayer Bingo</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app" class="app-shell"></div>

  <!-- QR code library: client-side only, no account needed -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

  <!-- Firebase compat SDK: easiest for beginners in plain HTML/JS. Works from GitHub Pages. -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

  <!-- Paste your Firebase config in js/config.js. Leave demoMode:true to test without Firebase. -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
